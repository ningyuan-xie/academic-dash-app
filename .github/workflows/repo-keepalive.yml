name: Keep Repo Active

on:
  schedule:
    - cron: "17 4 * * 0"   # weekly: Sunday 04:17 UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Update keepalive file
        run: |
          echo "Last keepalive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/keepalive.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git commit -m "chore: weekly keepalive" || exit 0
          git push